name: noctune_mobile
description: "NOC Tune - Network Quality Testing Tool for Mobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  
  # Network Testing
  http: ^1.2.2
  dio: ^5.7.0
  dart_ping: ^9.0.1
  
  # Platform Info
  connectivity_plus: ^6.1.0
  network_info_plus: ^6.0.1
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # State Management
  provider: ^6.1.2
  
  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  sqflite: ^2.4.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
